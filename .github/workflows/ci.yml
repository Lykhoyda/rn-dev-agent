name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CodeQL actions/missing-workflow-permissions (alerts #27 #28):
# declare minimal permissions at the workflow level. Both jobs only
# read source and run tests — they never push, comment, or release.
permissions:
  contents: read

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 — Phase 134.5 SHA pin

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0 — Phase 134.5 SHA pin
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: yarn.lock

      # Install from repo root so Yarn resolves the workspace graph once.
      - run: corepack enable
      - run: corepack yarn install --immutable

      # GH#432: build + freshness in one gate. Users run the COMMITTED dist;
      # an unconditional rebuild here silently repairs a stale artifact in CI
      # while shipping it broken to installs.
      - name: TypeScript build + dist freshness gate
        run: bash scripts/check-dist-fresh.sh

      # GH#439: CI must invoke the same package.json scripts as local runs so
      # the test-file globs live in exactly one place — #340 shipped because an
      # inline CI glob silently skipped 22 nested unit-test files while
      # `yarn test` ran them. The unit run also emits Node's built-in coverage
      # report (report-only, no thresholds) so untested areas stay visible.
      # GH#437 (audit P0-B): wire-contract drift must fail a NAMED gate, not
      # hide in the unit blob — tri-file command-enum/protocol sync (#418/#383)
      # plus golden contract tests over payloads captured from live runners.
      # Runs BEFORE the broad unit step so a contract regression fails here,
      # under the gate's name (the unit globs also include these files).
      - name: Runner wire-contract gate
        run: corepack yarn workspace rn-dev-agent-core test:contract

      - name: Unit tests (with coverage report)
        run: corepack yarn test:coverage

      - name: Integration tests
        run: corepack yarn test:integration

      # Runs at repo root (no working-directory) — guards the changeset CI gate.
      - name: Changeset-guard unit test
        run: bash scripts/test/require-changeset.test.sh

      # GH#316/B215: changeset package names must resolve to real workspace packages.
      - name: Changeset-name validator unit test
        run: bash scripts/test/validate-changeset-names.test.sh

      # GH#252/B196: SessionStart must stay bounded (hook timeout + curl time limits).
      - name: SessionStart bounded-startup guard
        run: bash scripts/test/session-start-bounded.test.sh

      # GH#266: feedback collector must not present stale/orphaned telemetry as recent.
      - name: Feedback telemetry staleness guard
        run: bash scripts/test/telemetry-staleness.test.sh

      # GH#419: upgrade notice must recommend /mcp reconnect before restart; the
      # SessionStart banner must not assert a static tool count; the lockfile
      # probe must flag a live bridge from a previous plugin install.
      - name: MCP upgrade-notice + bridge-probe guard
        run: bash scripts/test/mcp-upgrade-notice.test.sh

      # GH#432: the freshness gate is itself tested (house rule for CI guards).
      - name: Dist-freshness guard unit test
        run: bash scripts/test/check-dist-fresh.test.sh

      # GH#377: convert-gif must mkdir an explicit gifPath's parent before ffmpeg.
      - name: record_proof convert-gif output-dir guard
        run: bash scripts/test/record-proof-convert-gif.test.sh

      # GH#498: workspace package split contract for core/shared/host adapters.
      - name: Agent package split guard
        run: bash scripts/check-agent-package-sync.sh

      - name: Agent package split guard unit test
        run: bash scripts/test/check-agent-package-sync.test.sh

      # GH#498: docs-site is now a deliverable app workspace.
      - name: Docs app build
        run: corepack yarn workspace rn-dev-agent-docs build

  lint-format:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 — Phase 134.5 SHA pin
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0 — Phase 134.5 SHA pin
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: yarn.lock
      - run: corepack enable
      - run: corepack yarn install --immutable
      - name: oxlint
        run: corepack yarn lint
      - name: oxfmt check
        run: corepack yarn format:check
      - name: typescript-only gate
        run: bash scripts/check-typescript-only.sh

  version-sync:
    name: Version sync check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 — Phase 134.5 SHA pin
      - run: bash scripts/sync-versions.sh

  require-changeset:
    name: Require changeset
    runs-on: ubuntu-latest
    # PR-only: needs a base branch to diff against. Pushes to main are post-merge.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 — Phase 134.5 SHA pin
        with:
          fetch-depth: 0
      # base_ref is passed via env (never interpolate ${{ }} directly into run:).
      - name: Require a changeset when shippable src changes
        env:
          BASE_REF_NAME: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE_REF_NAME"
          BASE_REF="origin/$BASE_REF_NAME" bash scripts/require-changeset.sh

      # GH#316/B215: validate that every present changeset names a real workspace
      # package, so a typo fails the PR instead of release.yml's `changeset version`.
      - name: Validate changeset package names
        run: bash scripts/validate-changeset-names.sh

  web-bundle:
    name: Web bundle freshness
    runs-on: ubuntu-latest
    # PR-only: rebuilds the observability SPA and fails if the committed
    # single-file bundle drifted from source. The observability SPA remains
    # embedded inside the core package because it ships as part of the MCP dist.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 — Phase 134.5 SHA pin
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0 — Phase 134.5 SHA pin
        with:
          node-version: 22
      - run: bash scripts/check-web-bundle.sh
