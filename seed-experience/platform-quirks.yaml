platform_quirks:
  ios:
    - id: PQ_IOS_SCREENSHOT_FORMAT
      quirk: simctl screenshot only supports JPEG on iOS
      command: xcrun simctl io booted screenshot --type=jpeg <path>

    - id: PQ_IOS_PRIVACY
      quirk: Permission manipulation via simctl privacy
      command: xcrun simctl privacy booted <grant|revoke|reset> <permission> <bundleId>
      notes: Requires the app to actually request the permission first

    - id: PQ_IOS_NO_UIAUTOMATOR
      quirk: No equivalent of Android uiautomator dump on iOS
      workaround: Use agent-device snapshot for accessibility tree

    - id: PQ_IOS_SIMCTL_URL_DIALOG
      quirk: xcrun simctl openurl triggers confirmation dialog in Expo Go
      workaround: Use cdp_evaluate with __NAV_REF__ for navigation

    - id: PQ_IOS_RECORDVIDEO_CODEC
      quirk: simctl recordVideo --codec=h264 fails on macOS 26+
      workaround: Use --force without --codec flag

  android:
    - id: PQ_ANDROID_SCREENRECORD_LIMIT
      quirk: adb screenrecord has a 180-second (3 minute) maximum
      workaround: Keep proof recordings under 2 minutes

    - id: PQ_ANDROID_BOOT_DELAY
      quirk: Emulator reports "device" in adb before Maestro gRPC is ready
      workaround: Wait for sys.boot_completed=1 plus 5s additional settle time

    - id: PQ_ANDROID_CLEARSTATE
      quirk: clearState wipes Expo Dev Client Metro URL storage
      workaround: Do not use clearState with Dev Client builds

    - id: PQ_ANDROID_SCREENSHOT_PNG
      quirk: adb screencap outputs PNG only (no JPEG option)
      command: adb exec-out screencap -p > <path>.png

    - id: PQ_ANDROID_PERMISSION
      quirk: Permission manipulation via adb shell pm
      command: adb shell pm <grant|revoke> <package> <android.permission.NAME>

    - id: PQ_ANDROID_MAESTRO_GRPC
      quirk: Classic Maestro gRPC driver is unreliable on Android (UNAVAILABLE io exception)
      workaround: Always use maestro-runner which uses HTTP to UIAutomator2 instead of gRPC
      notes: Upstream Maestro issue #998, open since April 2023. maestro-runner eliminates this class of errors entirely.

    - id: PQ_ANDROID_TEXT_INPUT_CRASH
      quirk: adb shell input text crashes app with special chars (+, @, #) or long strings
      workaround: device_fill auto-chunks input on Android. For manual adb, split into <30 char chunks and escape special chars.

    - id: PQ_ANDROID_PLAY_PROTECT
      quirk: Google Play Protect on emulators can silently block test APK installations
      workaround: Disable in Settings > Security > Play Protect before running Maestro
