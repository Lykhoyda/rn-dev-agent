recovery_sequences:
  - id: RS_RELOAD_BEFORE_EDIT
    name: Reload before rewriting code on RedBox
    trigger: RedBox appears immediately after a file save with import/export errors
    steps:
      - cdp_reload(full=true)
      - wait 3s
      - check cdp_status — if errorCount=0, the error was stale fast-refresh
    saves: ~3 fix-retry loops on average
    confidence: 85

  - id: RS_CDP_RECONNECT
    name: Reconnect CDP after target loss
    trigger: cdp_status returns "not connected" or WebSocket 1006
    steps:
      - cdp_status (auto-reconnects)
      - if still disconnected, check Metro is running (curl localhost:8081/status)
      - if Metro dead, restart Metro and retry
    confidence: 90

  - id: RS_METRO_CACHE_CLEAR
    name: Clear Metro cache after config change
    trigger: babel.config.js, metro.config.js, or tailwind.config.js edited but changes not reflected
    steps:
      - kill Metro process
      - restart with --reset-cache flag
      - cdp_reload(full=true)
    confidence: 90

  - id: RS_DISMISS_KEYBOARD
    name: Dismiss keyboard before element interaction
    trigger: device_press or device_find fails on element below keyboard
    steps:
      - device_back (dismisses keyboard on both platforms)
      - wait 0.5s
      - retry the interaction
    confidence: 80

  - id: RS_SCROLL_TO_ELEMENT
    name: Scroll element into viewport before interaction
    trigger: device_find returns element but tap has no effect (off-screen)
    steps:
      - device_swipe(direction=up) to scroll down
      - retry device_find
      - repeat up to 3 times
    confidence: 75

  - id: RS_CLOSE_OTHER_DEBUGGER
    name: Close competing debugger connection
    trigger: WebSocket close 1006, "another debugger is already connected"
    steps:
      - ask user to close React Native DevTools, Flipper, or Chrome DevTools
      - retry cdp_status
    confidence: 95
