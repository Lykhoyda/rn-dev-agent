expo_gotchas:
  - id: EG_EXPO_GO_SDK_MISMATCH
    name: Expo Go SDK version mismatch
    symptom: "Project is incompatible with this version of Expo Go"
    cause: Expo Go on simulator is newer/older than project's SDK version
    fix: Use Dev Client builds instead of Expo Go for production-like testing
    severity: high

  - id: EG_NATIVEWIND_JSX_SOURCE
    name: NativeWind v4 requires jsxImportSource
    symptom: Styles don't apply, no error thrown, components render unstyled
    cause: babel.config.js missing jsxImportSource nativewind
    fix: "Add jsxImportSource: 'nativewind' to babel.config.js presets"
    severity: high

  - id: EG_EXPO_GO_NATIVE_MODULES
    name: Expo Go cannot use custom native modules
    symptom: TurboModuleRegistry module not found errors
    cause: Custom native modules require a Dev Client or bare build
    fix: Build a Dev Client with npx expo run:ios or npx expo run:android
    severity: high

  - id: EG_DEV_CLIENT_CLEARSTATE
    name: clearState breaks Dev Client Metro connection
    symptom: App opens to Dev Client launcher instead of JS bundle
    cause: clearState wipes the stored Metro server URL from Dev Client
    fix: Do not use clearState:true with Dev Client builds in Maestro flows
    severity: medium

  - id: EG_MSW_HERMES
    name: MSW (Mock Service Worker) does not work in React Native
    symptom: MSW fails to initialize, fetch mocking doesn't work
    cause: MSW relies on browser Service Workers API which is not available in React Native's Hermes/JSC runtime
    fix: Use custom fetch interceptor (global.fetch patch) instead of MSW
    severity: medium

  - id: EG_EXPO_ROUTER_DEEP_LINK
    name: Expo Router deep links trigger native confirmation dialog
    symptom: "Open in app?" dialog blocks automation
    cause: iOS shows a native confirmation when opening custom URI schemes
    fix: Use cdp_evaluate with __NAV_REF__ or globalThis.__EXPO_ROUTER__ instead
    severity: medium

  - id: EG_NEW_ARCH_CDP_TARGET
    name: New Architecture changes CDP target title
    symptom: CDP connects but app.dev=false, wrong JS context
    cause: Bridgeless mode targets use "React Native Bridgeless [C++ connection]" title
    fix: cdp_reload(full=true) probes __DEV__ on each target to find the right one
    severity: high
