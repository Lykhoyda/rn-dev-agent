# UI Skeleton — semantic intent → testID lookup table
#
# Single source of truth for your app's testIDs. Maestro flows in
# .rn-agent/actions/ reference semantic names instead of testID strings;
# when a testID changes, you update ONE entry here and re-generate any
# affected flows.
#
# Bootstrap by running `cdp_component_tree({ filter: '...' })` on each
# route while the app is running, then copying testIDs into the file
# below. (`/rn-dev-agent:nav-graph scan` populates a different artifact:
# nav-graph.yaml — the navigation topology, not the testID map.)
# Keep this file in sync as your testIDs evolve.
#
# Schema:
#   schemaVersion: 1
#   appId: <bundle-id>           # com.example.app or similar
#   generatedFrom: <free text>   # provenance — session id, date, etc.
#   screens:
#     <route-name>:
#       <semantic-name>: <testID>
#   navigation:
#     <semantic-name>: <testID>

schemaVersion: 1
appId: REPLACE_ME
generatedFrom: ""

screens: {}
# Example — uncomment after running device_snapshot on a real screen:
#   home:
#     primary-cta: home-cta-btn
#     search-input: home-search-input
#     profile-link: home-profile-link
#   settings:
#     logout-button: settings-logout-btn

navigation: {}
# Example — top-level tab/stack testIDs:
#   tab-home: tab-home
#   tab-profile: tab-profile
